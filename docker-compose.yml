version: '3.8'

services:
  # AurIx Backend Service
  aurix-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurix-backend
    ports:
      - "8000:8000"
    volumes:
      - ./results:/app/results
      - ./temp_files:/app/temp_files
      - ./version_2.0/ruleset:/app/version_2.0/ruleset:ro
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_ENDPOINT=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - aurix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Ollama Service for Local AI (LLM)
  ollama:
    image: ollama/ollama:latest
    container_name: aurix-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - aurix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  aurix-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local
